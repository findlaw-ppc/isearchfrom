<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Search Simulator</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; line-height: 1.6; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #4285f4; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #357ae8; }
    </style>
</head>
<body>
    <h2>Search Location Simulator</h2>
    <label>Search Query:</label>
    <input type="text" id="query" placeholder="e.g. coffee shop">

    <label>City (Canonical Name):</label>
    <input type="text" id="location" placeholder="e.g. London,England,United Kingdom">

    <label>Country Code (gl):</label>
    <input type="text" id="country" value="us">

    <label>Language (hl):</label>
    <input type="text" id="language" value="en">

    <button onclick="generateSearch()">Open Google Search</button>

    <script>
        function generateSearch() {
            const query = encodeURIComponent(document.getElementById('query').value);
            const location = document.getElementById('location').value;
            const country = document.getElementById('country').value;
            const language = document.getElementById('language').value;

            // Generate the UULE parameter
            const uule = createUule(location);
            
            // Build the final Google URL
            // &pws=0 removes personalization
            // &udm=14 forces "Web" view (no AI Overviews)
            const url = `https://www.google.com/search?q=${query}&gl=${country}&hl=${language}&uule=${uule}&pws=0&udm=14`;
            
            window.open(url, '_blank');
        }

        function createUule(name) {
            const key = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";
            const secretChar = key[name.length];
            const base64Name = btoa(name);
            return `w+CAIQICI${secretChar}${base64Name}`;
        }
    </script>
</body>
</html>
